name: Build Custom UE4 Image

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permission to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image name
        id: image_name
        run: |
          TARGET_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/ue4-custom-build:latest"
          # Sanitize repository name (convert to lowercase)
          TARGET_IMAGE_LOWER=$(echo "$TARGET_IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$TARGET_IMAGE_LOWER" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.IMAGE_NAME }}

      - name: Echo target image name
        run: echo "Successfully built and pushed image to ${{ steps.image_name.outputs.IMAGE_NAME }}"
